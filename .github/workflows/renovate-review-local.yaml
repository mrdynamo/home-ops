---
name: "Renovate PR Review - Local Model"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: renovate-review-local-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.user.login == 'robot-rosey[bot]'
    name: Breaking Change Analysis
    runs-on: home-ops-runner
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Generate Claude Bot Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: claude-token
        with:
          app-id: ${{ secrets.CLAUDE_BOT_APP_ID }}
          private-key: ${{ secrets.CLAUDE_BOT_APP_PRIVATE_KEY }}
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify LiteLLM Reachability
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${LITELLM_API_KEY}" \
            http://litellm.ai.svc:4000/v1/models > /tmp/litellm-models.json
          grep -q 'qwen3.5:9b' /tmp/litellm-models.json

      - name: Review PR with self-hosted model
        id: ai-review
        uses: misospace/pr-reviewer-action@fbf128ba574db43ef6783c3d026bf59f9247c07c # v1
        with:
          github_token: ${{ steps.claude-token.outputs.token }}
          ai_stream: false
          ai_base_url: "http://litellm.ai.svc:4000/v1"
          ai_model: "qwen3.5:9b"
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          # ai_primary_retries: '30'
          # ai_primary_retry_delay_sec: '30'
          # ai_fallback_api_format: 'anthropic'
          # ai_fallback_base_url: "http://litellm.ai.svc:4000"
          # ai_fallback_model: "minimax/MiniMax-M2.7"
          # ai_fallback_api_key: ${{ secrets.LITELLM_API_KEY }}
          allowed_source_hosts: 'github.com,api.github.com,gitlab.com,registry.terraform.io,artifacthub.io,minecraft.net,www.minecraft.net,talos.dev,www.talos.dev'
          context_limit_mode: normal
          tool_mode: plan_execute_once
          tool_max_requests: '4'
          tool_planning_timeout_sec: '90'
          tool_planning_max_context_bytes: '15000'
          tool_planning_max_tokens: '300'
          tool_max_response_bytes: '12000'
          tool_allowed_gh_api_repos: '*'
          tool_request_timeout_sec: '15'
          tool_failure_enforcement: 'true'
          tool_min_successful_requests: '1'
          tool_enable_for_forks: 'false'
          # standards_file_candidates: 'AGENTS.md,.agents/*'
          publish_review_comment: 'true'
          comment_marker: <!-- renovate-review-bot -->

      - name: Resolve latest managed review comment URL
        if: steps.ai-review.outputs.should_review == 'true'
        id: review-comment-url
        env:
          GH_TOKEN: ${{ steps.claude-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_MARKER: '<!-- renovate-review-bot -->'
        run: |
          set -euo pipefail

          COMMENT_URL="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" --paginate | jq -r --arg marker "$COMMENT_MARKER" '[.[] | select((.body // "") | contains($marker))] | last | .html_url // empty')"

          if [[ -n "$COMMENT_URL" ]]; then
            REVIEW_BODY="Automated review completed. Full findings: $COMMENT_URL"
          else
            REVIEW_BODY="Automated review completed. Full findings are in the managed review comment."
          fi

          {
            echo 'review_body<<EOF'
            echo "$REVIEW_BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Submit PR review decision
        if: steps.ai-review.outputs.should_review == 'true'
        env:
          GH_TOKEN: ${{ steps.claude-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.ai-review.outputs.verdict }}
          REVIEW_BODY: ${{ steps.review-comment-url.outputs.review_body }}
        run: |
          set -euo pipefail

          if [[ "$VERDICT" == "approve" ]]; then
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "$REVIEW_BODY"
          elif [[ "$VERDICT" == "request_changes" ]]; then
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body "$REVIEW_BODY"
          else
            echo "Unexpected verdict from AI reviewer: $VERDICT" >&2
            exit 1
          fi
