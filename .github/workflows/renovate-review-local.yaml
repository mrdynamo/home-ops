---
name: "Renovate PR Review - Local Model"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: renovate-review-local-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.user.login == 'robot-rosey[bot]'
    name: Breaking Change Analysis
    runs-on: home-ops-runner
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Generate Claude Bot Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: claude-token
        with:
          app-id: ${{ secrets.CLAUDE_BOT_APP_ID }}
          private-key: ${{ secrets.CLAUDE_BOT_APP_PRIVATE_KEY }}
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify LiteLLM Reachability
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${LITELLM_API_KEY}" \
            http://litellm.ai.svc:4000/v1/models > /tmp/litellm-models.json
          grep -q 'qwen3.5:9b' /tmp/litellm-models.json

      - name: Review PR with self-hosted model
        uses: misospace/pr-reviewer-action@v1
        with:
          github_token: ${{ steps.claude-token.outputs.token }}
          ai_base_url: "http://litellm.ai.svc:4000/v1"
          ai_model: "qwen3.5:9b"
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          standards_file: ""
          publish_review_comment: "true"
          system_prompt: |
            You research dependency upgrades in Renovate pull requests and submit a GitHub PR review with your findings.
            You do not make changes to files; you investigate and report.

            REPO: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}

            Follow the repository corpus and do not invent facts. For dependency upgrades, trace the actual upstream change and map it to this repo's usage.

            Output format:
            - Return only one valid JSON object.
            - Do not wrap it in markdown or code fences.
            - Do not include any prose before or after the JSON.
            - Use exactly these top-level keys: verdict, review_markdown.
            - verdict must be either "approve" or "request_changes".
            - review_markdown must be a non-empty string containing the full review body.

            Review body guidance:
            - State whether the upgrade is safe to merge or requires changes.
            - Include breaking changes, deprecations, and useful new features only when applicable.
            - Cite the specific files in this repo that are affected.
            - Do not include raw logs, secrets, tokens, hostnames, or other sensitive infrastructure details.
