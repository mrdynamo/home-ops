# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.30.10:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.30.10"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-01"
    ipAddress: "192.168.30.21"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    # Control Base
    talosImageURL: factory.talos.dev/installer/ec4ab973e3af0198d0fa09d324f874a78ec085b18c7b9d299042b0b75a3823d6
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:50:56:9e:c7:a2"
        dhcp: false
        addresses:
          - "192.168.30.21/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.30.1"
        mtu: 1500
        vip:
          ip: "192.168.30.10"
  - hostname: "k8s-02"
    ipAddress: "192.168.30.22"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    # Control Base
    talosImageURL: factory.talos.dev/installer/ec4ab973e3af0198d0fa09d324f874a78ec085b18c7b9d299042b0b75a3823d6
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:50:56:9e:b5:c8"
        dhcp: false
        addresses:
          - "192.168.30.22/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.30.1"
        mtu: 1500
        vip:
          ip: "192.168.30.10"
  - hostname: "k8s-03"
    ipAddress: "192.168.30.23"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    # Control Base
    talosImageURL: factory.talos.dev/installer/ec4ab973e3af0198d0fa09d324f874a78ec085b18c7b9d299042b0b75a3823d6
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:50:56:9e:89:bb"
        dhcp: false
        addresses:
          - "192.168.30.23/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.30.1"
        mtu: 1500
        vip:
          ip: "192.168.30.10"
  - hostname: "k8s-04"
    ipAddress: "192.168.30.24"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    # Worker GPU - Intel UHD 750 iGPU
    talosImageURL: factory.talos.dev/installer/2d15e47582029529952009c448e1e3c6759d306fcc9fd954eca545cfbb496ea7
    patches:
      # - "@./patches/intel-gpu/machine-files.yaml"
      - "@./patches/intel-gpu/machine-udevd.yaml"
      - "@./patches/intel-gpu/watchdog.yaml"
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "84:a9:38:9d:b9:f3"
        dhcp: false
        addresses:
          - "192.168.30.24/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.30.1"
        mtu: 1500
  - hostname: "k8s-05"
    ipAddress: "192.168.30.25"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    # Worker Base
    talosImageURL: factory.talos.dev/installer/76b8c0bae954a11b3b9ac35b9427e996e69d764c4a226ee34d08aa7479efae9f
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:50:56:9e:7e:65"
        dhcp: false
        addresses:
          - "192.168.30.25/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.30.1"
        mtu: 1500
  - hostname: "k8s-06"
    ipAddress: "192.168.30.26"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    # Worker GPU - Nvidia LTS Proprietary (580.126.20)
    talosImageURL: factory.talos.dev/installer/c611e56816907adf65d0f5c8a775ddeffbb80348f6f6c3fa66e5b41496a951da
    patches:
      - "@./patches/nvidia-gpu/machine-kernel.yaml"
      - "@./patches/nvidia-gpu/machine-sysctls.yaml"
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:50:56:9e:e9:f1"
        dhcp: false
        addresses:
          - "192.168.30.26/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.30.1"
        mtu: 1500

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-logging.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  # - "@./patches/global/oomconfig.yaml" # https://github.com/siderolabs/talos/issues/12526

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/global/machine-features.yaml"
    - "@./patches/controller/watchdog.yaml"

# Worker patches
worker:
  patches:
    - "@./patches/worker/machine-kubelet.yaml"
    - "@./patches/worker/machine-labels.yaml"
    # - "@./patches/worker/machine-files.yaml"
