---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      kind: HelmRelease
      group: helm.toolkit.fluxcd.io
      version: v2
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: not-used
      spec:
        values:
          defaultPodOptions:
            annotations:
              k8s.ksgate.org/postgres-ready: |
                {
                  "apiVersion": "postgresql.cnpg.io/v1",
                  "kind": "Cluster",
                  "name": "postgres",
                  "namespace": "database",
                  "expression": "resource.status.readyInstances >= 1"
                }
              k8s.ksgate.org/postgres-service: |
                {
                  "apiVersion": "v1",
                  "kind": "Service",
                  "name": "postgres-rw",
                  "namespace": "database"
                }
              k8s.ksgate.org/database-applied: |
                {
                  "apiVersion": "postgresql.cnpg.io/v1",
                  "kind": "Database",
                  "name": "postgres-${APP}",
                  "namespace": "database",
                  "expression": "resource.status.applied"
                }
            schedulingGates:
              - name: k8s.ksgate.org/postgres-ready
              - name: k8s.ksgate.org/postgres-service
              - name: k8s.ksgate.org/database-applied
          persistence:
            root-ca:
              type: configMap
              name: root-ca
              globalMounts:
                - path: /var/run/secrets/root-ca
            postgres-certs:
              type: custom
              defaultMode: 0640
              globalMounts:
                - path: /var/run/secrets/postgresql
              volumeSpec:
                csi:
                  driver: csi.cert-manager.io
                  readOnly: true
                  volumeAttributes:
                    csi.cert-manager.io/issuer-name: postgres-client-ca
                    csi.cert-manager.io/issuer-kind: ClusterIssuer
                    csi.cert-manager.io/key-algorithm: ECDSA
                    csi.cert-manager.io/key-size: "384"
                    csi.cert-manager.io/key-encoding: PKCS8
                    csi.cert-manager.io/key-usages: client auth
                    csi.cert-manager.io/common-name: ${DATABASE_OWNER:=${APP}}
                    csi.cert-manager.io/dns-names: $${POD_NAME}.$${POD_NAMESPACE}.svc.cluster.local
