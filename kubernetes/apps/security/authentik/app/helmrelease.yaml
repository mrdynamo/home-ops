---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  dependsOn: []
  interval: 15m
  values:
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: "authentik-secret"
        k8s.ksgate.org/postgres-ready: |
          {
            "apiVersion": "postgresql.cnpg.io/v1",
            "kind": "Cluster",
            "name": "postgres",
            "namespace": "database",
            "expression": "resource.status.readyInstances >= 1"
          }
        k8s.ksgate.org/postgres-service: |
          {
            "apiVersion": "v1",
            "kind": "Service",
            "name": "postgres-rw",
            "namespace": "database"
          }
        k8s.ksgate.org/database-applied: |
          {
            "apiVersion": "postgresql.cnpg.io/v1",
            "kind": "Database",
            "name": "postgres-${APP}",
            "namespace": "database",
            "expression": "resource.status.applied"
          }
      deploymentStrategy:
        type: RollingUpdate
      env:
        # Postgres settings
        - name: AUTHENTIK_POSTGRESQL__NAME
          value: *app
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: pooler-rw.database.svc
        - name: AUTHENTIK_POSTGRESQL__USER
          value: *app
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: verify-full
        - name: AUTHENTIK_POSTGRESQL__SSLROOTCERT
          value: /var/run/secrets/root-ca/ca.crt
        - name: AUTHENTIK_POSTGRESQL__SSLCERT
          value: /var/run/secrets/postgres/tls.crt
        - name: AUTHENTIK_POSTGRESQL__SSLKEY
          value: /var/run/secrets/postgres/tls.key
        # SMTP settings
        - name: AUTHENTIK_EMAIL__USE_TLS
          value: "true"
        - name: AUTHENTIK_EMAIL__FROM
          value: "authentik@${SECRET_DOMAIN}"
      envFrom:
        - secretRef:
            name: authentik-secret
      volumes:
        - name: &volume-ca root-ca
          configMap:
            name: root-ca
        - name: &volume-postgres postgres-certs
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: postgres-client-ca
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/key-algorithm: ECDSA
              csi.cert-manager.io/key-size: "384"
              csi.cert-manager.io/key-encoding: PKCS8
              csi.cert-manager.io/key-usages: client auth
              csi.cert-manager.io/common-name: *app
              csi.cert-manager.io/dns-names: $${POD_NAME}.$${POD_NAMESPACE}.svc.cluster.local
      volumeMounts:
        - name: *volume-ca
          mountPath: /var/run/secrets/root-ca
          readOnly: true
        - name: *volume-postgres
          mountPath: /var/run/secrets/postgres
          readOnly: true
    postgresql:
      enabled: false
    redis:
      enabled: false
    server:
      autoscaling: &autoscaling
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 60
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 300
          scaleDown:
            stabilizationWindowSeconds: 300
      resources: &resources
        requests:
          cpu: 200m
        limits:
          memory: 1Gi
      metrics: &metrics
        enabled: true
        prometheus:
          serviceMonitor:
            enabled: true
      route:
        main:
          enabled: true
          hostnames: ["auth.${SECRET_DOMAIN}"]
          parentRefs:
            - name: external
              namespace: kube-system
              sectionName: https
    worker:
      autoscaling: *autoscaling
      resources: *resources
      metrics: *metrics
    prometheus:
      rules:
        enabled: true
