_ollama_params: &ollama_params
  api_base: os.environ/OLLAMA_BASE_URL
  api_key: ollama

model_list:
  # These aliases keep the client-facing names stable while LiteLLM
  # forwards the upstream model IDs that each llama.cpp server expects.

  #########################
  # Ollama Local Models   #
  #########################
  - model_name: llama3.2:3b
    litellm_params:
      <<: *ollama_params
      model: ollama/llama3.2:3b

  - model_name: llava:7b
    litellm_params:
      <<: *ollama_params
      model: ollama/llava:7b

  - model_name: minicpm-v:8b
    litellm_params:
      <<: *ollama_params
      model: ollama/minicpm-v:8b

  - model_name: gpt-oss:20b
    litellm_params:
      <<: *ollama_params
      model: ollama/gpt-oss:20b

  - model_name: qwen3.6:27b
    litellm_params:
      <<: *ollama_params
      model: ollama/qwen3.6:27b

  - model_name: llama3.2-vision:11b
    litellm_params:
      <<: *ollama_params
      model: ollama/llama3.2-vision:11b

  - model_name: llama3:8b
    litellm_params:
      <<: *ollama_params
      model: ollama/llama3:8b

  - model_name: qwen3-vl:8b-instruct-bf16
    litellm_params:
      <<: *ollama_params
      model: ollama/qwen3-vl:8b-instruct-bf16

  - model_name: gemma3:27b-it-qat
    litellm_params:
      <<: *ollama_params
      model: ollama/gemma3:27b-it-qat

  - model_name: gemma3:12b
    litellm_params:
      <<: *ollama_params
      model: ollama/gemma3:12b

  - model_name: qwen3-vl:30b
    litellm_params:
      <<: *ollama_params
      model: ollama/qwen3-vl:30b

  - model_name: qwen3-vl:8b
    litellm_params:
      <<: *ollama_params
      model: ollama/qwen3-vl:8b

  - model_name: mistral-nemo:12b
    litellm_params:
      <<: *ollama_params
      model: ollama/mistral-nemo:12b

  - model_name: deepseek-coder-v2:16b
    litellm_params:
      <<: *ollama_params
      model: ollama/deepseek-coder-v2:16b

  - model_name: qwen2.5-coder:7b
    litellm_params:
      <<: *ollama_params
      model: ollama/qwen2.5-coder:7b

  - model_name: qwen2.5:32b
    litellm_params:
      <<: *ollama_params
      model: ollama/qwen2.5:32b

  - model_name: deepseek-r1:14b
    litellm_params:
      <<: *ollama_params
      model: ollama/deepseek-r1:14b

  - model_name: deepseek-r1:1.5b
    litellm_params:
      <<: *ollama_params
      model: ollama/deepseek-r1:1.5b

  - model_name: deepseek-r1:8b
    litellm_params:
      <<: *ollama_params
      model: ollama/deepseek-r1:8b

  - model_name: deepseek-r1:7b
    litellm_params:
      <<: *ollama_params
      model: ollama/deepseek-r1:7b

  #########################
  # Minimax API Models    #
  #########################
  - model_name: minimax/MiniMax-M2.7
    litellm_params:
      model: minimax/MiniMax-M2.7
      api_base: https://api.minimax.io/anthropic
      api_key: os.environ/MINIMAX_API_KEY
    model_info:
      input_cost_per_token: 0.0000003
      output_cost_per_token: 0.0000012


#########################
# Application Settings  #
#########################
general_settings:
  health_check_endpoint: /v1/health
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  user_header_mappings:
    - header_name: X-OpenWebUI-User-Name
      litellm_user_role: internal_user
    - header_name: X-OpenWebUI-User-Email
      litellm_user_role: customer
  store_prompts_in_spend_logs: true

router_settings:
  routing_strategy: simple-shuffle
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT

litellm_settings:
  success_callback: ["prometheus"]
  prometheus_adapter: true
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
  drop_params: true
  set_verbose: false

environment_variables: []
  # - DATABASE_URL
  # - MINIMAX_API_KEY
  # - MOONSHOT_API_KEY
  # - REDIS_HOST
  # - REDIS_PORT
