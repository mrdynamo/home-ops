_ollama_params: &ollama_params
  api_base: os.environ/OLLAMA_BASE_URL
  api_key: ollama
  num_ctx: 32768

_ollama_model_info: &ollama_model_info
  litellm_provider: ollama
  input_cost_per_token: 0
  output_cost_per_token: 0
  max_tokens: 8192
  max_output_tokens: 8192

model_list:
  # These aliases keep the client-facing names stable while LiteLLM
  # forwards the upstream model IDs that each llama.cpp server expects.

  #########################
  # Ollama Local Models   #
  #########################
  - model_name: llama3.2:3b
    litellm_params:
      <<: *ollama_params
      model: ollama/llama3.2:3b
    model_info:
      <<: *ollama_model_info

  - model_name: llava:7b
    litellm_params:
      <<: *ollama_params
      model: ollama/llava:7b
    model_info:
      <<: *ollama_model_info

  - model_name: minicpm-v:8b
    litellm_params:
      <<: *ollama_params
