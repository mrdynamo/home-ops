---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  timeout: 10m
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 2
        strategy: RollingUpdate
        initContainers:
          prisma-cert:
            image:
              repository: docker.io/library/alpine
              tag: 3.23.4
            command:
              - /bin/sh
              - -ec
              - |
                apk add --no-cache openssl
                openssl pkcs12 -export \
                  -in /var/run/secrets/postgresql/tls.crt \
                  -inkey /var/run/secrets/postgresql/tls.key \
                  -out /var/run/secrets/prisma/client-identity.p12 \
                  -passout pass:
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            args:
              - --config=/app/config.yaml
            env:
              # General App Settings
              LITELLM_LOG: DEBUG
              LITELLM_MODE: PRODUCTION
              DOCS_URL: "/docs"
              ROOT_REDIRECT_URL: "/ui"
              UI_USERNAME: admin
              # SSO Settings
              GENERIC_AUTHORIZATION_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/authorize/"
              GENERIC_TOKEN_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/token/"
              GENERIC_USERINFO_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/userinfo/"
              GENERIC_SCOPE: "openid profile email litellm-role"
              GENERIC_USER_ROLE_ATTRIBUTE: "role"
              PROXY_BASE_URL: "https://{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
              # Postgres Settings
              DATABASE_URL: "postgresql://litellm@pooler-rw.database.svc:5432/litellm?sslmode=require&sslidentity=/var/run/secrets/prisma/client-identity.p12&sslcert=/var/run/secrets/root-ca/ca.crt"
              REDIS_HOST: "{{ .Release.Name }}-dragonfly.ai.svc"
              REDIS_PORT: "6379"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: &port 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 978m
                memory: 1806m
              limits:
                memory: 1806m
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: http
            path: /metrics
            interval: 5s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        type: configMap
        name: *app
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
      cache:
        type: emptyDir
        advancedMounts:
          litellm:
            app:
              - path: /app/cache
      prisma-certs:
        type: emptyDir
        advancedMounts:
          litellm:
            prisma-cert:
              - path: /var/run/secrets/prisma
            app:
              - path: /var/run/secrets/prisma
