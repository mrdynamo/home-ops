---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  timeout: 10m
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        initContainers:
          prisma-cert:
            image:
              repository: docker.io/library/alpine
              tag: 3.22.2
            command:
              - /bin/sh
              - -ec
              - |
                apk add --no-cache openssl
                openssl pkcs12 -export \
                  -in /var/run/secrets/postgresql/tls.crt \
                  -inkey /var/run/secrets/postgresql/tls.key \
                  -out /var/run/secrets/prisma/client-identity.p12 \
                  -passout pass:
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            args:
              - --config=/app/config.yaml
            env:
              # General App Settings
              LITELLM_LOG: DEBUG
              LITELLM_MODE: PRODUCTION
              # DOCS_URL: /docs
              # ROOT_REDIRECT_URL: /ui
              UI_USERNAME: admin
              # Postgres Settings
              DATABASE_URL: postgresql://litellm@pooler-rw.database.svc:5432/litellm?sslmode=require&sslidentity=/var/run/secrets/prisma/client-identity.p12&sslcert=/var/run/secrets/root-ca/ca.crt
              # REDIS_HOST: "{{ .Release.Name }}-dragonfly"
              # REDIS_PORT: "6379"
              # CHATGPT_TOKEN_DIR: /app/chatgpt_tokens
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: metrics
            path: /metrics
            interval: 30s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        type: configMap
        name: *app
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
      cache:
        type: emptyDir
        advancedMounts:
          litellm:
            app:
              - path: /app/cache
      prisma-certs:
        type: emptyDir
        advancedMounts:
          litellm:
            prisma-cert:
              - path: /var/run/secrets/prisma
            app:
              - path: /var/run/secrets/prisma
