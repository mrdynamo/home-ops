---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  timeout: 10m
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 2
        strategy: RollingUpdate
        initContainers:
          gen-prisma-cert:
            image:
              repository: docker.io/library/alpine
              tag: 3.23.4
            command:
              - /bin/sh
              - -ec
              - |
                apk add --no-cache openssl
                openssl pkcs12 -export \
                  -in /var/run/secrets/postgresql/tls.crt \
                  -inkey /var/run/secrets/postgresql/tls.key \
                  -out /var/run/secrets/prisma/client-identity.p12 \
                  -passout pass:
          install-pillow-deps:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            command:
              - /app/.venv/bin/python
              - -c
              - |
                import hashlib
                import json
                import platform
                import urllib.request
                import zipfile
                from pathlib import Path

                VERSION = "12.2.0"
                WHEELS = {
                    ("x86_64", "glibc"): (
                        "pillow-12.2.0-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.whl",
                        "03f6fab9219220f041c74aeaa2939ff0062bd5c364ba9ce037197f4c6d498cd9",
                    ),
                    ("aarch64", "glibc"): (
                        "pillow-12.2.0-cp313-cp313-manylinux2014_aarch64.manylinux_2_17_aarch64.whl",
                        "f1c943e96e85df3d3478f7b691f229887e143f81fedab9b20205349ab04d73ed",
                    ),
                    ("x86_64", "musl"): (
                        "pillow-12.2.0-cp313-cp313-musllinux_1_2_x86_64.whl",
                        "1e1757442ed87f4912397c6d35a0db6a7b52592156014706f17658ff58bbf795",
                    ),
                    ("aarch64", "musl"): (
                        "pillow-12.2.0-cp313-cp313-musllinux_1_2_aarch64.whl",
                        "00a2865911330191c0b818c59103b58a5e697cae67042366970a6b6f1b20b7f9",
                    ),
                }

                arch = platform.machine().lower()
                if arch in {"arm64", "armv8"}:
                    arch = "aarch64"
                libc = platform.libc_ver()[0].lower() or "glibc"
                if "musl" in libc:
                    libc = "musl"
                else:
                    libc = "glibc"

                key = (arch, libc)
                if key not in WHEELS:
                    raise SystemExit(f"Unsupported platform for pinned Pillow wheel: arch={arch}, libc={libc}")

                filename, expected_sha = WHEELS[key]
                with urllib.request.urlopen(f"https://pypi.org/pypi/Pillow/{VERSION}/json", timeout=30) as response:
                    release = json.load(response)

                candidates = [f for f in release["urls"] if f.get("filename") == filename and f.get("packagetype") == "bdist_wheel"]
                if len(candidates) != 1:
                    raise SystemExit(f"Pinned wheel not found in release metadata: {filename}")

                wheel = candidates[0]
                metadata_sha = wheel["digests"]["sha256"].lower()
                if metadata_sha != expected_sha:
                    raise SystemExit(f"Digest mismatch in metadata for {filename}: {metadata_sha} != {expected_sha}")

                url = wheel["url"]
                if not url.startswith("https://files.pythonhosted.org/"):
                    raise SystemExit(f"Unexpected artifact host: {url}")

                wheel_path = Path("/tmp") / filename
                with urllib.request.urlopen(url, timeout=60) as response:
                    data = response.read()
                actual_sha = hashlib.sha256(data).hexdigest()
                if actual_sha != expected_sha:
                    raise SystemExit(f"Digest mismatch for downloaded wheel {filename}: {actual_sha} != {expected_sha}")

                wheel_path.write_bytes(data)
                target = Path("/opt/pillow")
                target.mkdir(parents=True, exist_ok=True)
                with zipfile.ZipFile(wheel_path, "r") as zf:
                    zf.extractall(target)

                print(f"Installed {filename} into {target}")
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            args:
              - --config=/app/config.yaml
            env:
              # General App Settings
              # LITELLM_LOG: DEBUG
              LITELLM_MODE: PRODUCTION
              PYTHONPATH: /opt/pillow
              DOCS_URL: "/docs"
              ROOT_REDIRECT_URL: "/ui"
              UI_USERNAME: admin
              # SSO Settings
              GENERIC_AUTHORIZATION_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/authorize/"
              GENERIC_TOKEN_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/token/"
              GENERIC_USERINFO_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/userinfo/"
              GENERIC_SCOPE: "openid profile email litellm-role"
              GENERIC_USER_ROLE_ATTRIBUTE: "role"
              PROXY_BASE_URL: "https://{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
              # Postgres Settings
              DATABASE_URL: "postgresql://litellm@pooler-rw.database.svc:5432/litellm?sslmode=require&sslidentity=/var/run/secrets/prisma/client-identity.p12&sslcert=/var/run/secrets/root-ca/ca.crt"
              REDIS_HOST: "{{ .Release.Name }}-dragonfly.ai.svc"
              REDIS_PORT: "6379"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: &port 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 978m
                memory: 1806Mi
              limits:
                memory: 1806Mi
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: http
            path: /metrics
            interval: 5s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        type: configMap
        name: *app
        advancedMounts:
          litellm:
            app:
              - path: /app/config.yaml
                subPath: config.yaml
                readOnly: true
      cache:
        type: emptyDir
        advancedMounts:
          litellm:
            app:
              - path: /app/cache
      pillow:
        type: emptyDir
        advancedMounts:
          litellm:
            install-pillow-deps:
              - path: /opt/pillow
            app:
              - path: /opt/pillow
      prisma-certs:
        type: emptyDir
        advancedMounts:
          litellm:
            gen-prisma-cert:
              - path: /var/run/secrets/prisma
            app:
              - path: /var/run/secrets/prisma
