---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  timeout: 10m
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        initContainers:
          prisma-cert:
            image:
              repository: docker.io/library/alpine
              tag: 3.23.4
            command:
              - /bin/sh
              - -ec
              - |
                apk add --no-cache openssl
                openssl pkcs12 -export \
                  -in /var/run/secrets/postgresql/tls.crt \
                  -inkey /var/run/secrets/postgresql/tls.key \
                  -out /var/run/secrets/prisma/client-identity.p12 \
                  -passout pass:
          install-deps:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            command:
              - /bin/sh
              - -ec
              - |
                /app/.venv/bin/python -m ensurepip --upgrade
                /app/.venv/bin/python -m pip install --no-cache-dir --upgrade pip
                /app/.venv/bin/python -m pip install --no-cache-dir Pillow
          setup-ui:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            command:
              - /bin/sh
              - -ec
              - |
                cp -r /app/.venv/lib/python3.13/site-packages/litellm/proxy/_experimental/out/* /app/var/litellm/ui/
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            args:
              - --config=/app/config.yaml
            env:
              # General App Settings
              TZ: America/Chicago
              LITELLM_LOG: DEBUG
              LITELLM_MODE: PRODUCTION
              # Non-Root Settings
              LITELLM_NON_ROOT: "true"
              LITELLM_UI_PATH: /app/var/litellm/ui
              LITELLM_ASSETS_PATH: /app/var/litellm/assets
              LITELLM_MIGRATION_DIR: /app/migrations
              PRISMA_BINARY_CACHE_DIR: /app/cache/prisma-python/binaries
              XDG_CACHE_HOME: /app/cache
              # UI Settings
              DOCS_URL: "/docs"
              ROOT_REDIRECT_URL: "/ui"
              UI_USERNAME: admin
              # SSO Settings
              GENERIC_AUTHORIZATION_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/authorize/"
              GENERIC_TOKEN_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/token/"
              GENERIC_USERINFO_ENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/userinfo/"
              GENERIC_SCOPE: "openid profile email litellm-role"
              GENERIC_USER_ROLE_ATTRIBUTE: "role"
              PROXY_BASE_URL: "https://{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
              # Postgres Settings
              DATABASE_URL: "postgresql://litellm@pooler-rw.database.svc:5432/litellm?sslmode=require&sslidentity=/var/run/secrets/prisma/client-identity.p12&sslcert=/var/run/secrets/root-ca/ca.crt"
              REDIS_HOST: "{{ .Release.Name }}-dragonfly.ai.svc"
              REDIS_PORT: "6379"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 101
              runAsGroup: 101
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              readiness: *probes
            # resources:
            #   requests:
            #     cpu: 574m
            #     memory: 1556Mi
            #   limits:
            #     memory: 1556Mi
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: http
            path: /metrics
            interval: 5s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        type: configMap
        name: *app
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
      writable:
        type: emptyDir
        advancedMounts:
          litellm:
            prisma-cert:
              - path: /var/run/secrets/prisma
                subPath: prisma-certs
            setup-ui:
              - path: /app/var/litellm/ui
                subPath: ui
              - path: /app/var/litellm/assets
                subPath: assets
            app:
              - path: /app/cache
                subPath: cache
              - path: /tmp
                subPath: tmp
              - path: /app/var/litellm/ui
                subPath: ui
              - path: /app/var/litellm/assets
                subPath: assets
              - path: /app/migrations
                subPath: migrations
              - path: /var/run/secrets/prisma
                subPath: prisma-certs
