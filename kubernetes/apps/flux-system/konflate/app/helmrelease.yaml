---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app konflate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    config:
      repo: github://mrdynamo/home-ops
      statusChecks: true
      prComments: true
      publicUrl: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
      mcp: true
    secret:
      existingSecret: konflate-webhook-token-secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: external
          namespace: kube-system
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
