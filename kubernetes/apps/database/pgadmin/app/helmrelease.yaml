---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pgadmin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      pgadmin:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-certs:
            image:
              repository: busybox
              tag: 1.37.0
            command:
              - sh
              - -c
              - |
                # Copy and rename certificates for Postgres SSL connection
                echo "Copying certs"
                cp -v /var/run/secrets/postgresql/ca.crt /home/pgadmin/.postgresql/root.crt
                cp -v /var/run/secrets/postgresql/tls.crt /home/pgadmin/.postgresql/postgresql.crt
                cp -v /var/run/secrets/postgresql/tls.key /home/pgadmin/.postgresql/postgresql.key
                # Set proper ownership and permissions for pgadmin user (uid=5050)
                echo "Adjusting cert permissions"
                chown -v 5050:5050 /home/pgadmin/.postgresql/root.crt /home/pgadmin/.postgresql/postgresql.crt /home/pgadmin/.postgresql/postgresql.key
                chmod -v 644 /home/pgadmin/.postgresql/root.crt
                chmod -v 644 /home/pgadmin/.postgresql/postgresql.crt
                chmod -v 600 /home/pgadmin/.postgresql/postgresql.key
                echo "Cert copy and permission adjustment completed"
            securityContext:
              allowPrivilegeEscalation: true
              runAsUser: 0
              runAsGroup: 0
        containers:
          app:
            image:
              repository: docker.io/dpage/pgadmin4
              tag: 9.13.0@sha256:d243a4bcc02d2ee6b447c601692813531d2d0fbca18b583d9f7f9658da835d81
            env:
              TZ: America/Chicago
              PGADMIN_DISABLE_POSTFIX: "True"
              PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 80
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            # securityContext:
            #   allowPrivilegeEscalation: false
            #   readOnlyRootFilesystem: true
            #   capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 221m
                memory: 339Mi
              limits:
                memory: 339Mi
    defaultPodOptions:
      securityContext:
        # runAsNonRoot: true
        runAsUser: 5050
        runAsGroup: 5050
        fsGroup: 5050
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /var/lib/pgadmin
      configmap:
        type: configMap
        name: *app
        defaultMode: 0640
        globalMounts:
          - path: /pgadmin4/servers.json
            subPath: servers.json
      certificates:
        type: emptyDir
        globalMounts:
          - path: /home/pgadmin/.postgresql
