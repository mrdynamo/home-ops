---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: &name postgres
  annotations:
    # required for seamless bootstrap: https://github.com/cloudnative-pg/cloudnative-pg/issues/5778#issuecomment-2783417464
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 2

  imageName: ghcr.io/cloudnative-pg/postgresql:18.2-standard-trixie@sha256:65837d4877b8529f31a7c7aec009e35f44cd5e90b19c090ed520711194ffb9af

  certificates:
    serverTLSSecret: postgres-server-cert
    serverCASecret: postgres-server-cert
    clientCASecret: postgres-client-ca
    replicationTLSSecret: postgres-client-cert

  storage:
    size: 8Gi
    storageClass: longhorn-fast

  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised

  plugins:
    - name: &plugin barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: &store cloudflare-r2-store

  externalClusters:
    - name: &src source
      plugin:
        name: *plugin
        parameters:
          barmanObjectName: *store
          serverName: *name

  ##### RECOVERY #####

  ## Uncomment the below section to enable recovery from r2.
  ## Complete this prior to bootstrapping the cluster.

  bootstrap:
    recovery:
      source: *src

  monitoring:
    enablePodMonitor: true

  postgresql:
    pg_hba:
      - hostnossl all all 10.42.0.0/16      scram-sha-256
      - hostnossl all all 2001:cafe:42::/56 scram-sha-256
      - hostssl   all all all               cert clientcert=verify-full

    shared_preload_libraries:
      - "vchord.so"
      - "timescaledb"
    parameters:
      timescaledb.telemetry_level: "off" # For TimescaleDB (Tracearr)
      timescaledb.max_tuples_decompressed_per_dml_transaction: "0" # For TimescaleDB (Tracearr)
      max_locks_per_transaction: "4096" # For TimescaleDB (Tracearr) DEFAULT: 128

    extensions:
      - name: postgis
        ld_library_path:
          - system
        image:
          reference: ghcr.io/cloudnative-pg/postgis-extension-testing:3.6.0-18-trixie@sha256:ec21540f5799561a9b05ca188fd28ce32852a826f48d80329260940855f5f558
      - name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v0.5.3@sha256:c310ede47f7f82bd257c3e53806d60680d5899c318ca946fb313efad9a90a78e
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
      - name: timescaledb
        image:
          reference: ghcr.io/shusaan/timescaledb-testing:2.23.1-18-trixie@sha256:4709935bed4cce5977bc4b1858a94e2e80f22f0303217163a9e97b8898e33ee2

  managed:
    roles:

      - name: authentik
        ensure: present
        login: true
        superuser: false
        disablePassword: true

      - name: dispatcharr
        ensure: present
        login: true
        superuser: false
        disablePassword: true

      - name: gatus
        ensure: present
        login: true
        superuser: false
        disablePassword: true

      - name: paperless
        ensure: present
        login: true
        superuser: false
        disablePassword: true

      - name: pgadmin
        ensure: present
        login: true
        superuser: true
        disablePassword: true

      - name: tracearr
        ensure: present
        login: true
        superuser: false
        disablePassword: true
