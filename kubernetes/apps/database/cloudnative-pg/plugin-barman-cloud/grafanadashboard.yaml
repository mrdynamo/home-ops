---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: barman-cloud
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "title": "CNPG Barman-Cloud",
      "uid": "cnpg-barman-cloud",
      "tags": [
        "cnpg",
        "postgres",
        "backup",
        "barman",
        "r2"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0,
            "refresh": 1
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp, namespace)",
            "current": {
              "selected": false,
              "text": "database",
              "value": "database"
            },
            "refresh": 2,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "annotations": {
        "list": []
      },
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Backup Health",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Last Backup Age",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 6,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "time() - max(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=\"$namespace\"})"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 93600
                  },
                  {
                    "color": "red",
                    "value": 172800
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "description": "Time since the most recent successful base backup. Red if older than 48h, yellow after 26h."
        },
        {
          "id": 3,
          "type": "stat",
          "title": "First Recoverability Point",
          "gridPos": {
            "x": 6,
            "y": 1,
            "w": 6,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "time() - min(barman_cloud_cloudnative_pg_io_first_recoverability_point{namespace=\"$namespace\"})"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 93600
                  },
                  {
                    "color": "red",
                    "value": 172800
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "description": "Oldest PITR-recoverable timestamp. How far back you can restore from WAL + base backups combined."
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Last Backup Failed At",
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 6,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "time() - max(barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp{namespace=\"$namespace\"})"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 3600
                  },
                  {
                    "color": "green",
                    "value": 21600
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "description": "Time since the most recent FAILED backup. Red if recent (within an hour), green if failure is old."
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Cluster Reachable",
          "gridPos": {
            "x": 18,
            "y": 1,
            "w": 6,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "count(up{job=\"database/postgres\",namespace=\"$namespace\"} == 1) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "description": "Number of CNPG pods currently scraping successfully to Prometheus."
        },
        {
          "id": 6,
          "type": "row",
          "title": "Backup Cadence",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Time Since Last Backup (hours)",
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "(time() - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=\"$namespace\"}) / 3600",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "Hours since each pod last reported a successful backup. Should reset to ~0 at every backup run."
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "WAL Archival Rate (files/s)",
          "gridPos": {
            "x": 12,
            "y": 8,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "rate(cnpg_pg_stat_archiver_archived_count{namespace=\"$namespace\"}[5m])",
              "legendFormat": "archived"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "rate(cnpg_pg_stat_archiver_failed_count{namespace=\"$namespace\"}[5m])",
              "legendFormat": "failed"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 4,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "Rate of WAL files archived to R2 (success vs failure). A persistent failure rate means WAL archiving is broken."
        },
        {
          "id": 9,
          "type": "row",
          "title": "WAL Activity",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 16,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "WAL Volume Generated (bytes/s)",
          "gridPos": {
            "x": 0,
            "y": 17,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "rate(cnpg_collector_wal_bytes{namespace=\"$namespace\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "Rate of WAL bytes being written locally. Spikes during heavy write workloads."
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "WAL Records / FPI Rate",
          "gridPos": {
            "x": 8,
            "y": 17,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "rate(cnpg_collector_wal_records{namespace=\"$namespace\"}[5m])",
              "legendFormat": "records"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "rate(cnpg_collector_wal_fpi{namespace=\"$namespace\"}[5m])",
              "legendFormat": "fpi"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "WAL records and full-page images per second. FPI/record ratio indicates vacuum / bulk-load behavior."
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "WAL Files on Disk",
          "gridPos": {
            "x": 16,
            "y": 17,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "cnpg_collector_pg_wal{namespace=\"$namespace\",value=~\"count|keep|max|min\"}",
              "legendFormat": "{{pod}} — {{value}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "WAL segment bookkeeping: count=total on disk, keep=safe to recycle, max/min=observed range."
        },
        {
          "id": 13,
          "type": "row",
          "title": "Database Sizing",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 25,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Database Size (bytes)",
          "gridPos": {
            "x": 0,
            "y": 26,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "cnpg_pg_database_size_bytes{namespace=\"$namespace\"}",
              "legendFormat": "{{datname}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "Per-database on-disk size (reported by postgres). Litellm and Tracearr are typically the largest consumers."
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Database Growth Rate (bytes/h)",
          "gridPos": {
            "x": 12,
            "y": 26,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "deriv(cnpg_pg_database_size_bytes{namespace=\"$namespace\"}[1h]) * 3600",
              "legendFormat": "{{datname}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "description": "Hourly growth rate per database. Watch for runaway growth in litellm/tracearr/dispatcharr."
        },
        {
          "id": 16,
          "type": "row",
          "title": "Backup & Archiver State",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 34,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 17,
          "type": "table",
          "title": "WAL Archive Status",
          "gridPos": {
            "x": 0,
            "y": 35,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "cnpg_collector_pg_wal_archive_status{namespace=\"$namespace\"}",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "sortBy": [
              {
                "displayName": "pod",
                "desc": false
              }
            ]
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                }
              }
            },
            "overrides": []
          },
          "transformations": [
            {
              "id": "groupBy",
              "options": {
                "fields": {
                  "all": false,
                  "pod": true,
                  "value": true
                },
                "aggregations": [
                  "lastNotNull"
                ]
              }
            }
          ],
          "description": "Current pg_wal archive_command status per pod: 'done' = archived successfully, 'ready' = pending."
        },
        {
          "id": 18,
          "type": "stat",
          "title": "WALs Archived (total)",
          "gridPos": {
            "x": 12,
            "y": 35,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "cnpg_pg_stat_archiver_archived_count{namespace=\"$namespace\"}"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "description": "Total WAL files archived since last pg_stat_reset."
        },
        {
          "id": 19,
          "type": "stat",
          "title": "WALs Failed (total)",
          "gridPos": {
            "x": 18,
            "y": 35,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
