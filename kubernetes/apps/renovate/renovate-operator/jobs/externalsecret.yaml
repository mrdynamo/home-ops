---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homeops-bot-pem
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homeops-bot-pem
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: github-app
        property: GITHUB_APP_PRIVATE_KEY
