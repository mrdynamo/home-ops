---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name renovate-operator
  namespace: &namespace renovate
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: renovate-operator
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *name
      namespace: *namespace
  interval: 1h
  path: ./kubernetes/apps/renovate/renovate-operator/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
