---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 30m
  values:
    fullnameOverride: *app
    route:
      enabled: true
      hostnames:
        - "renovate.${INTERNAL_SECRET_DOMAIN}"
      parentRefs:
        - name: internal
          namespace: kube-system
          sectionName: https
    webhook:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 401"]
      route:
        enabled: true
        hostnames:
          - "renovate-webhook.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
        grafanaDashboard:
          allowCrossNamespaceImport: true
