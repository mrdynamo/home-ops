---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
  namespace: volsync
spec:
  enabled: true
  trigger:
    schedule: 30 3 * * *
  repository:
    repository: volsync-maintenance-secret
  moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            path: /mnt/tank/backups/kopia/repository
            server: 192.168.20.21
