---
# Role + RoleBinding granting the tuppr-pdb-cleaner ServiceAccount in
# system-upgrade permission to delete Longhorn's per-node instance-manager
# PDBs in the storage namespace.
#
# Longhorn's instance-manager controller re-creates these PDBs with fresh
# hash suffixes whenever a node returns or the instance-manager pod
# reschedules, so the names change. The hook deletes by name prefix
# (`instance-manager-`) at runtime, so the RBAC scope is intentionally
# all PDBs in the `storage` namespace — the hook filters by name before
# deleting (see talosupgrade.yaml hooks.pre).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tuppr-pdb-cleaner
  namespace: storage
rules:
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tuppr-pdb-cleaner
  namespace: storage
subjects:
  - kind: ServiceAccount
    name: tuppr-pdb-cleaner
    namespace: system-upgrade
roleRef:
  kind: Role
  name: tuppr-pdb-cleaner
  apiGroup: rbac.authorization.k8s.io
