---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy:
      - alertname
      - job
    groupInterval: 5m
    groupWait: 1m
    receiver: discord
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      # - receiver: heartbeat
      #   groupWait: 0s
      #   repeatInterval: 2m30s
      #   matchers:
      #     - name: alertname
      #       value: Watchdog
      #       matchType: =
      - receiver: homeassistant-powercycle-k8s-04
        continue: true
        matchers:
          - name: alertname
            value: HomeAssistantPowercycleK8s04Trigger
            matchType: =
      - receiver: all-receivers
        matchers:
          - name: alertname
            value: NodeSystemSaturation
            matchType: =
      - receiver: all-receivers
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
  - name: "null"
  - name: discord
    discordConfigs:
      - apiURL:
          name: &secret alertmanager-secret
          key: &discordKey ALERTMANAGER_DISCORD_WEBHOOK
        avatarURL: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/alertmanager.png
    # - name: heartbeat
    #   webhookConfigs:
    #     - httpConfig:
    #         bearerTokenSecret:
    #           name: &secret alertmanager-secret
    #           key: BUDDY_HEARTBEAT_TOKEN
    #       urlSecret:
    #         name: *secret
    #         key: BUDDY_HEARTBEAT_URL
  - name: pushover
    pushoverConfigs:
      - html: true
        message: |-
          {{- range .Alerts }}
            {{- if ne .Annotations.description "" }}
              {{ .Annotations.description }}
            {{- else if ne .Annotations.summary "" }}
              {{ .Annotations.summary }}
            {{- else if ne .Annotations.message "" }}
              {{ .Annotations.message }}
            {{- else }}
              Alert description not available
            {{- end }}
            {{- if gt (len .Labels.SortedPairs) 0 }}
              <small>
                {{- range .Labels.SortedPairs }}
                  <b>{{ .Name }}:</b> {{ .Value }}
                {{- end }}
              </small>
            {{- end }}
          {{- end }}
        priority: |-
          {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
        sendResolved: true
        sound: gamelan
        title: >-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        ttl: 86400s
        token:
          name: *secret
          key: &pushoverToken ALERTMANAGER_PUSHOVER_TOKEN
        userKey:
          name: *secret
          key: &pushoverKey PUSHOVER_USER_KEY
        url: https://siren.${INTERNAL_SECRET_DOMAIN}/alerts
        urlTitle: View in Siren
  - name: all-receivers
    discordConfigs:
      - apiURL:
          name: *secret
          key: *discordKey
        avatarURL: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/alertmanager.png
    pushoverConfigs:
      - html: true
        message: |-
          {{- range .Alerts }}
            {{- if ne .Annotations.description "" }}
              {{ .Annotations.description }}
            {{- else if ne .Annotations.summary "" }}
              {{ .Annotations.summary }}
            {{- else if ne .Annotations.message "" }}
              {{ .Annotations.message }}
            {{- else }}
              Alert description not available
            {{- end }}
            {{- if gt (len .Labels.SortedPairs) 0 }}
              <small>
                {{- range .Labels.SortedPairs }}
                  <b>{{ .Name }}:</b> {{ .Value }}
                {{- end }}
              </small>
            {{- end }}
          {{- end }}
        priority: |-
          {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
        sendResolved: true
        sound: gamelan
        title: >-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        ttl: 86400s
        token:
          name: *secret
          key: *pushoverToken
        userKey:
          name: *secret
          key: *pushoverKey
        url: https://siren.${INTERNAL_SECRET_DOMAIN}/alerts
        urlTitle: View in Siren
  - name: homeassistant-powercycle-k8s-04
    webhookConfigs:
      - urlSecret:
          name: *secret
          key: HOMEASSISTANT_WEBHOOK_POWERCYCLE_K8S_04
        sendResolved: false
