---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gatus
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-pg-certs:
            image:
              repository: busybox
              tag: 1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
            command:
              - /bin/sh
              - -ec
            args:
              - |
                echo "Copying Postgres certs into writable runtime volume"
                mkdir -p /certs/runtime/postgresql /certs/runtime/root-ca
                cp -v /var/run/secrets/postgresql/tls.key /certs/runtime/postgresql/tls.key
                cp -v /var/run/secrets/postgresql/tls.crt /certs/runtime/postgresql/tls.crt
                cp -v /var/run/secrets/postgresql/ca.crt /certs/runtime/postgresql/ca.crt
                cp -v /var/run/secrets/root-ca/ca.crt /certs/runtime/root-ca/ca.crt
                echo "Setting Postgres certs ownership"
                chown -v 1000:100 /certs/runtime/postgresql/tls.key /certs/runtime/postgresql/tls.crt /certs/runtime/postgresql/ca.crt /certs/runtime/root-ca/ca.crt
                echo "Setting Postgres certs permissions"
                chmod -v 600 /certs/runtime/postgresql/tls.key
                chmod -v 644 /certs/runtime/postgresql/tls.crt /certs/runtime/postgresql/ca.crt /certs/runtime/root-ca/ca.crt
            securityContext:
              readOnlyRootFilesystem: false
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
          gatus-sidecar:
            image:
              repository: ghcr.io/home-operations/gatus-sidecar
              tag: 0.0.13@sha256:40d549ea5ae89acac94bdf4cee1233e718a96c6e382c67f7e28de688511169d2
            args:
              - --auto-httproute
              - --enable-httproute
              - --enable-service
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
            restartPolicy: Always
        containers:
          app:
            image:
              repository: ghcr.io/twin/gatus
              tag: v5.35.0@sha256:21609f31be8c4e680ce3004b24276305666239c99aff58391503f3fb6142f39d
            env:
              TZ: America/Chicago
              GATUS_CONFIG_PATH: /config
              GATUS_WEB_PORT: &port 80
              GATUS_DELAY_START_SECONDS: 15
              GATUS_LOG_LEVEL: debug
              GATUS_POSTGRES_PATH: "postgresql://gatus@postgres-rw.database.svc:5432/gatus?sslmode=verify-full&sslcert=/certs/runtime/postgresql/tls.crt&sslkey=/certs/runtime/postgresql/tls.key&sslrootcert=/certs/runtime/root-ca/ca.crt"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 120
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {add: ["NET_RAW"], drop: ["ALL"]}
            resources:
              requests:
                cpu: 16m
                memory: 109Mi
              limits:
                memory: 109Mi
        statefulset:
          volumeClaimTemplates:
            - name: config
              storageClass: longhorn-fast
              accessMode: ReadWriteOnce
              size: 2Gi
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8s-04
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "status.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
    rbac:
      roles:
        *app :
          type: ClusterRole
          rules:
            - apiGroups:
                - ""
              resources:
                - services
              verbs:
                - get
                - watch
                - list
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gateways
                - httproutes
              verbs:
                - get
                - watch
                - list
      bindings:
        *app :
          type: ClusterRoleBinding
          roleRef:
            identifier: *app
          subjects:
            - identifier: *app
    serviceAccount:
      *app : {}
    persistence:
      cert-runtime:
        type: custom
        globalMounts:
          - path: /certs/runtime
        volumeSpec:
          emptyDir: {}
      config-file:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
