---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prometheus-adapter
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    prometheus:
      url: http://prometheus-operated.observability.svc.cluster.local:9090
    rules:
      external:
        - seriesQuery: probe_success
          resources:
            namespaced: false
          name:
            as: nfs_available
          metricsQuery: max_over_time(probe_success{instance=~".+:2049"}[1m])
