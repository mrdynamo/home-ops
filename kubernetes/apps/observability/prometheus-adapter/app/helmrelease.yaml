---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prometheus-adapter
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    prometheus:
      url: http://prometheus-operated.observability.svc.cluster.local
    rules:
      default: false
      external:
        - seriesQuery: '{__name__="probe_success"}'
          resources:
            namespaced: false
          name:
            as: probe_success
          metricsQuery: max_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])
