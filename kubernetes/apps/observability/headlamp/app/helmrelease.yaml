---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app headlamp
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 30m
  values:
    automountServiceAccountToken: true
    clusterRoleBinding:
      clusterRoleName: cluster-admin
      create: true
    config:
      inCluster: true
      inClusterContextName: "main"
      pluginsDir: /build/plugins
      enableHelm: false
      watchPlugins: false
      unsafeUseServiceAccountToken: true
      # Utilize authentik outpost, as native OIDC requires configuring k8s API server with OIDC.
      # Will configure k8s OIDC in the future.
      # https://github.com/kubernetes-sigs/headlamp/issues/  4539
      # oidc:
      #   externalSecret:
      #     enabled: true
      #     name: headlamp-secret
      #   scopes: "openid,profile,email"
    fullnameOverride: *app
    httpRoute:
      enabled: true
      hostnames:
        - "headlamp.${INTERNAL_SECRET_DOMAIN}"
      parentRefs:
        - name: internal
          namespace: kube-system
          sectionName: https
      rules:
        - backendRefs:
            - name: authentik-server
              namespace: security
              port: 80
    initContainers:
      - # Install Flux plugin
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0@sha256:055377b9011dcc73235e8969c488ecd92af5cb70aa5d5df0f66c1cea667fdccb
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
        name: &plugins headlamp-plugins
        volumeMounts:
          - mountPath: /build/plugins
            name: *plugins
    podAnnotations:
      reloader.stakater.com/auto: "true"
    service:
      port: 4466
    serviceAccount:
      create: true
    volumes:
      - name: *plugins
        emptyDir: {}
    volumeMounts:
      - mountPath: /build/plugins
        name: *plugins
