# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: tcp
spec:
  module: tcp_connect
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - 192.168.20.21:2049
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
