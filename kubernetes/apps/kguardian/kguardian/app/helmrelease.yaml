---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kguardian
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 30m
  values:
    controller:
      excludedNamespaces:
        - *app
