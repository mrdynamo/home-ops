---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-gpt
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: paperless-gpt-secret
    template:
      data:
        OLLAMA_HOST: "{{ .OLLAMA_BASE_URL }}"
        PAPERLESS_API_TOKEN: "{{ .PAPERLESS_GPT_TOKEN }}"
  dataFrom:
    - extract:
        key: ollama
    - extract:
        key: paperless
