---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-gpt
spec:
  chartRef:
    kind: OCIRepository
    name: paperless-gpt
  interval: 1h
  values:
    controllers:
      paperless-gpt:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/icereed/paperless-gpt
              tag: v0.27.0@sha256:855d9df5bacb2bed60bd520f1ffe0d118695aef9f77d37466ae85823001f547d
            # v0.26.0 ships an entrypoint.sh that runs as root to adduser and
            # chown /app before dropping to a paperless-gpt user via su-exec.
            # That conflicts with runAsNonRoot + readOnlyRootFilesystem, so we
            # bypass the entrypoint and run the binary directly. The Go
            # binary does not depend on $HOME or any user-home directory.
            command:
              - /app/paperless-gpt
            env:
              TZ: America/Chicago
              PAPERLESS_BASE_URL: http://paperless.default.svc.cluster.local:8000
              # LLM Configuration
              OPENAI_BASE_URL: http://litellm.ai.svc.cluster.local:4000
              LLM_LANGUAGE: English
              LLM_PROVIDER: openai
              LLM_MODEL: llama3.2:3b
              OCR_PROVIDER: llm
              VISION_LLM_PROVIDER: openai
              VISION_LLM_MODEL: minicpm-v:8b
              # Document Processing Settings
              AUTO_GENERATE_TITLE: false
              AUTO_GENERATE_TAGS: false
              AUTO_GENERATE_CORRESPONDANTS: false
              AUTO_GENERATE_DOCUMENT_TYPE: false
              AUTO_GENERATE_CREATED_DATE: false
              # Tagging Settings
              MANUAL_TAG: _paperless-gpt_manual_
              AUTO_TAG: _paperless-gpt_auto_
              AUTO_TAG_COMPLETE: _paperless-gpt_auto-complete_
              AUTO_OCR_TAG: _paperless-gpt_ocr-auto_
              PDF_OCR_COMPLETE_TAG: _paperless-gpt_ocr-complete_
              PDF_OCR_TAGGING: true
              FAIL_TAG: _paperless-gpt_fail_
              # OCR Settings
              OCR_LIMIT_PAGES: 50
              OCR_PROCESS_MODE: image
              PDF_SKIP_EXISTING_OCR: false
              # Enhanced OCR Settings
              PDF_UPLOAD: true
              PDF_COPY_METADATA: true
              PDF_REPLACE: false  # Whether to delete the original document (use with caution!)
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 978Mi
              limits:
                cpu: 1500m
                memory: 978Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 8080
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          paperless-gpt:
            app:
              - path: /app/db
                subPath: db
              - path: /app/prompts
                subPath: prompts
      tmpfs:
        type: emptyDir
        advancedMounts:
          paperless-gpt:
            app:
              - path: /app/config
                subPath: config
              - path: /tmp
                subPath: tmp
