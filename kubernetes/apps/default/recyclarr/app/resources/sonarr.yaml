# yaml-language-server: $schema=https://schemas.recyclarr.dev/latest/config-schema.json
### Highly recommend using Visual Studio Code with indent-rainbow plugin. VSC will also leverage the above link to enhance pmm yml edits.

###################################################################################################
#                                                                                                 #
#                              Recyclarr Configuration: Sonarr (v4)                               #
#                                    WEB-1080p and WEB-2160p                                      #
#                                                                                                 #
###################################################################################################

# Instance Definition: https://recyclarr.dev/wiki/yaml/config-reference/basic/
sonarr:
  sonarr-prod:
    base_url: http://sonarr.default.svc.cluster.local
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true

    media_management:
      propers_and_repacks: do_not_prefer

    media_naming:
      episodes:
        anime: default
        daily: default
        rename: true
        standard: default
      season: default
      series: plex-imdb

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
        reset_unmatched_scores:
          enabled: true
      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6 # WEB-2160p
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        ###########################################
        #                                         #
        #         WEB-1080p Modifications         #
        #                                         #
        ###########################################

        # HDR Groups
        - trash_id: 7e1724c5da59e7474803ad25be98f6a3 # HDR
          select:
            - 505d871304820ba7106b693be6fe4a9e # HDR
          assign_scores_to:
            - name: WEB-1080p
        - trash_id: 7d366c213e5c23a052b157356fac1921 # HDR10+ Boost
          select:
            - 0c4b99df9206d2cfac3c05ab897dd62a # HDR10+ Boost
          assign_scores_to:
            - name: WEB-1080p
        - trash_id: e0b2774083df4265f25c9e5bc6c80940 # DV Boost
          select:
            - 7c3a61a9c6cb04f52f1544be6d44a026 # DV Boost
          assign_scores_to:
            - name: WEB-1080p
        - trash_id: d776a1ea912a117d66d83b880ff2055d # DV (w/o HDR fallback)
          select:
            - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
          assign_scores_to:
            - name: WEB-1080p

        ## Golden Rule HD (x265 modifications)
        - trash_id: 158188097a58d7687dee647e04af0da3 # Golden Rule HD
          select:
            - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
          assign_scores_to:
            - name: WEB-1080p
              score: 0
        - trash_id: 158188097a58d7687dee647e04af0da3 # Golden Rule HD
          exclude:
            - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
          assign_scores_to:
            - name: WEB-1080p

        ###########################################
        #                                         #
        #         WEB-2160p Modifications         #
        #                                         #
        ###########################################

        # SDR (Allow)
        - trash_id: e1053c0ef622df3749fa43c22865663a # SDR
          select:
            - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
          assign_scores_to:
            - name: WEB-2160p
              score: 0
