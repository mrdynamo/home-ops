---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: &app dispatcharr
spec:
  allowCrossNamespaceImport: true
  folder: default
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: *app
    key: dashboard.json
