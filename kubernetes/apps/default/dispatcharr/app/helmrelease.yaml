---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      dispatcharr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &image
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.24.0@sha256:c9920ece0dd653c12ac251aa406351a3006043200f02054472d34c417e365190
            env: &env
              TZ: America/Chicago
              PUID: 1000
              PGID: 1000
              # DISPATCHARR_LOG_LEVEL: DEBUG
              # Process Priority Configuration (Optional)
              # Lower values = higher priority. Range: -20 (highest) to 19 (lowest)
              # Negative values require cap_add: SYS_NICE
              UWSGI_NICE_LEVEL: -10 # uWSGI/FFmpeg/Streaming (default: 0, recommended: -5 for high priority)
              CELERY_NICE_LEVEL: 15 # Celery/EPG/Background tasks (default: 5, low priority)
              # Modular deployment properties
              DISPATCHARR_ENV: modular
              ## PostgreSQL configuration for modular deployment
              POSTGRES_HOST: pooler-rw.database.svc
              POSTGRES_PORT: 5432
              POSTGRES_DB: *app
              POSTGRES_USER: *app
              POSTGRES_SSL: true
              POSTGRES_SSL_MODE: verify-full
              POSTGRES_SSL_CA_CERT: /var/run/secrets/root-ca/ca.crt
              POSTGRES_SSL_CERT: /var/run/secrets/postgresql/tls.crt
              POSTGRES_SSL_KEY: /var/run/secrets/postgresql/tls.key
              ## Redis configuration for modular deployment
              REDIS_HOST: dragonfly.database.svc
              REDIS_PORT: 6379
              REDIS_DB: 5
              # REDIS_URL:
              #   valueFrom:
              #     secretKeyRef:
              #       name: "{{ .Release.Name }}-dragonfly"
              #       key: url
              # REDIS_SSL: true
              # REDIS_SSL_VERIFY: true
              # REDIS_SSL_CA_CERT: /certs/redis/ca.crt
              # REDIS_SSL_CERT: /certs/redis/client.crt
              # REDIS_SSL_KEY: /certs/redis/client.key
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /api/core/version/
                    port: &port 9191
                    httpHeaders:
                      - name: Accept
                        value: application/json
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 5
              readiness: *probes
            securityContext: &sc
              # allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: true
              # capabilities: {drop: ["ALL"], add: ["SYS_NICE"] }
              capabilities: {add: ["SYS_NICE"]}
            resources:
              requests:
                cpu: 263m
                memory: 3000Mi
              limits:
                memory: 3000Mi
                gpu.intel.com/i915: 1 # Request portion of shared iGPU
                # nvidia.com/gpu.shared: 1 # Request portion of shared GPU
              # claims:
              #   - name: gpu
          celery:
            image: *image
            command: ["/app/docker/entrypoint.celery.sh"]
            env:
              <<: *env
              DJANGO_SETTINGS_MODULE: dispatcharr.settings
              DISPATCHARR_PORT: *port
            securityContext: *sc
            resources:
              requests:
                cpu: 129m
                memory: 1205Mi
              limits:
                memory: 1205Mi
          backup:
            image:
              repository: docker.io/library/postgres
              tag: 18.3-alpine3.23@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
            command:
              - /bin/sh
              - -ec
            args:
              - |
                if ! command -v zip >/dev/null 2>&1; then
                  apk add --no-cache zip
                fi
                mkdir -p /etc/crontabs /var/log/backup
                cat > /usr/local/bin/backup-cron-wrapper << 'WRAPPER_EOF'
                #!/bin/bash
                # Wrapper for backup cron job with proper environment loading
                set -euo pipefail

                # Run backup with logging
                /usr/local/bin/dispatcharr-backup 2>&1 | tee -a /var/log/backup/latest.log
                WRAPPER_EOF
                chmod 0755 /usr/local/bin/backup-cron-wrapper
                {
                  echo 'SHELL=/bin/bash'
                  echo 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
                  echo 'TZ=America/Chicago'
                  printf '%s %s\n' "$${BACKUP_CRON_SCHEDULE}" "/bin/bash /usr/local/bin/backup-cron-wrapper >> /proc/1/fd/1 2>> /proc/1/fd/2"
                } > /etc/crontabs/root
                chmod 0600 /etc/crontabs/root
                echo "Dispatcharr backup sidecar ready"
                if [ "$${BACKUP_CRON_ENABLED:-true}" != "true" ]; then
                  echo "Backup schedule disabled"
                  trap 'exit 0' TERM INT
                  while true; do sleep 3600; done
                fi
                exec crond -f -c /etc/crontabs
            env:
              <<: *env
              BACKUP_ROOT: /data/backups
              BACKUP_MARKER: SIDECAR
              BACKUP_CRON_ENABLED: "true"
              BACKUP_CRON_SCHEDULE: "0 */6 * * *"
              PGAPPNAME: dispatcharr-backup-sidecar
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              readOnlyRootFilesystem: false
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi
    # defaultPodOptions:
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     fsGroup: 1000
    #     fsGroupChangePolicy: OnRootMismatch
    # resourceClaims:
    #   - name: gpu
    #     resourceClaimTemplateName: dispatcharr
    # runtimeClassName: nvidia
    # affinity:
    #   nodeAffinity:
    #     requiredDuringSchedulingIgnoredDuringExecution:
    #       nodeSelectorTerms:
    #         - matchExpressions:
    #             - key: nvidia.com/gpu.count
    #               operator: Gt
    #               values: ["0"]
    # tolerations:
    #   - key: nvidia.com/gpu
    #     operator: Exists
    #     effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.30.112
        externalTrafficPolicy: Cluster
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: *port
          metrics:
            appProtocol: http
            port: 9192
          stream-cleanup:
            appProtocol: http
            port: 9193
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: metrics
            path: /metrics
            interval: 30s
            metricRelabelings:
              - action: labeldrop
                regex: "endpoint|instance|job|namespace|pod|service"
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      output:
        type: nfs
        server: 192.168.20.21
        path: /mnt/tank/media/plex
        globalMounts:
          - path: /data/exports
            subPath: dispatcharr/exports
          - path: /data/recordings
            subPath: dispatcharr/recordings
          - path: /data/backups
            subPath: dispatcharr/backups
      scripts:
        type: configMap
        name: *app
        defaultMode: 0755
        advancedMounts:
          dispatcharr:
            backup:
              - path: /usr/local/bin/dispatcharr-backup
                subPath: backup-sidecar.sh
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      backup-logs:
        type: emptyDir
        advancedMounts:
          dispatcharr:
            backup:
              - path: /var/log/backup
