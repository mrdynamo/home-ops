---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      dispatcharr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &image
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.21.1-20260330020940@sha256:d9ad8c68ec15f074defb5b32c1f3b32c4032d5cf191cfb6b663b392b7b812233
            env: &env
              TZ: America/Chicago
              DISPATCHARR_LOG_LEVEL: DEBUG
              # Process Priority Configuration (Optional)
              # Lower values = higher priority. Range: -20 (highest) to 19 (lowest)
              # Negative values require cap_add: SYS_NICE
              UWSGI_NICE_LEVEL: -10   # uWSGI/FFmpeg/Streaming (default: 0, recommended: -5 for high priority)
              CELERY_NICE_LEVEL: 15   # Celery/EPG/Background tasks (default: 5, low priority)
              # Modular deployment properties
              DISPATCHARR_ENV: modular
              ## PostgreSQL configuration for modular deployment
              POSTGRES_HOST: postgres-rw.database.svc
              POSTGRES_PORT: 5432
              POSTGRES_DB: *app
              POSTGRES_USER: *app
              POSTGRES_SSL: true
              POSTGRES_SSL_MODE: verify-full
              POSTGRES_SSL_CA_CERT: /var/run/secrets/postgresql/ca.crt
              POSTGRES_SSL_CERT: /var/run/secrets/postgresql/tls.crt
              POSTGRES_SSL_KEY: /var/run/secrets/postgresql/tls.key
              ## Redis configuration for modular deployment
              REDIS_HOST: dragonfly.database.svc
              REDIS_PORT: 6379
              REDIS_DB: 5
              REDIS_URL: redis://dragonfly.database.svc:6379/5
              # REDIS_SSL: true
              # REDIS_SSL_VERIFY: true
              # REDIS_SSL_CA_CERT: /certs/redis/ca.crt
              # REDIS_SSL_CERT: /certs/redis/client.crt
              # REDIS_SSL_KEY: /certs/redis/client.key
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/core/version/
                    port: &port 9191
                    httpHeaders:
                      - name: Accept
                        value: application/json
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 5
              readiness: *probes
            securityContext: &sc
              # allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: true
              # capabilities: {drop: ["ALL"], add: ["SYS_NICE"] }
              capabilities: {add: ["SYS_NICE"]}
            resources:
              # claims:
              #   - name: gpu
              requests:
                cpu: 144m
                memory: 2538Mi
              limits:
                memory: 2538Mi
                gpu.intel.com/i915: 1 # Request portion of shared iGPU
                # nvidia.com/gpu.shared: 1 # Request portion of shared GPU
          celery:
            image: *image
            command: ["/app/docker/entrypoint.celery.sh"]
            env:
              << : *env
              DJANGO_SETTINGS_MODULE: dispatcharr.settings
              DISPATCHARR_PORT: *port
            securityContext: *sc
    # defaultPodOptions:
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     fsGroup: 1000
    #     fsGroupChangePolicy: OnRootMismatch
      # resourceClaims:
      #   - name: gpu
      #     resourceClaimTemplateName: dispatcharr
      # runtimeClassName: nvidia
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: nvidia.com/gpu.count
      #               operator: Gt
      #               values: ["0"]
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.30.112
        externalTrafficPolicy: Cluster
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: *port
          metrics:
            appProtocol: http
            port: 9192
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: metrics
            path: /metrics
            interval: 30s
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      output:
        type: nfs
        server: 192.168.20.21
        path: /mnt/tank/media/plex
        globalMounts:
          - path: /data/exports
            subPath: dispatcharr/exports
          - path: /data/recordings
            subPath: dispatcharr/recordings
          - path: /data/backups
            subPath: dispatcharr/backups
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
