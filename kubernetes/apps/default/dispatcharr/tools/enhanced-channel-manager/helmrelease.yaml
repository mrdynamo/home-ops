---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app enhanced-channel-manager
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/motwakorb/enhancedchannelmanager
              tag: 0.17.6-0127-dev@sha256:7aa44abad1551f34b78b95a2d3ab69639baf77bcdf5b4ba3faa2846c3bd5cb3c
            env:
              TZ: America/Chicago
              ECM_LIMIT_CONCURRENCY: 25
              ECM_TIMEOUT_KEEP_ALIVE: 15
              MCP_HOST: http://enhanced-channel-manager.default.svc:6101
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 6100
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 251m
                memory: 843Mi
              limits:
                memory: 843Mi
          mcp:
            image:
              repository: ghcr.io/motwakorb/enhancedchannelmanager-mcp
              tag: 0.17.6-0127-dev@sha256:e93bfe16d7ade4311b5a9798285373b0cc941715b546db56421b909995db3493
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi
            env:
              TZ: America/Chicago
              ECM_URL: http://enhanced-channel-manager.default.svc:6100
              MCP_PORT: &mcp_port 6101
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
          mcp:
            port: *mcp_port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      backups:
        type: nfs
        server: 192.168.20.21
        path: /mnt/tank/media/plex
        globalMounts:
          - path: /config/backups
            subPath: dispatcharr/enhanced-channel-manager
      scripts:
        type: configMap
        name: *app
        defaultMode: 0755
        advancedMounts:
          *app :
            app:
              - path: /app/entrypoint.sh
                subPath: entrypoint.sh
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
