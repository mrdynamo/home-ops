---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app enhanced-channel-manager
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/motwakorb/enhancedchannelmanager
              tag: 0.18.0@sha256:59522600439c2059cba87b4deb5387ea079714966a723baaa77a7d969cec52d1
            env:
              TZ: America/Chicago
              ECM_LIMIT_CONCURRENCY: 25
              ECM_TIMEOUT_KEEP_ALIVE: 15
              MCP_HOST: http://enhanced-channel-manager.default.svc:6101
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 6100
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 1800Mi
              limits:
                memory: 6000Mi
          mcp:
            image:
              repository: ghcr.io/motwakorb/enhancedchannelmanager-mcp
              tag: 0.17.5@sha256:8c9b600eec251496c3063824d5f66ac2f6034b66e3d1812c38f51e60de1edf14
            env:
              TZ: America/Chicago
              ECM_URL: http://enhanced-channel-manager.default.svc:6100
              MCP_PORT: &mcp_port 6101
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
          mcp:
            port: *mcp_port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      scripts:
        type: configMap
        name: *app
        defaultMode: 0755
        advancedMounts:
          *app :
            app:
              - path: /app/entrypoint.sh
                subPath: entrypoint.sh
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
