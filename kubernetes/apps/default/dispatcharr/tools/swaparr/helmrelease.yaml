---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app swaparr
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Stage every writable overlay path the swaparr / nginx-alpine
          # entrypoint chain needs under a single shared /tmp emptyDir.
          # The app container then bind-mounts the relevant subdirectories
          # of that volume into their real paths via subPath.
          #
          # All subdirs must exist before the app container starts because
          # subPath mounts fail with "path does not exist" otherwise. mkdir
          # is idempotent so this is safe across restarts.
          init-tmp:
            image: &image
              repository: ghcr.io/mckenna654/swaparr
              tag: 1.1.1@sha256:601c6ea2d0aa2a700eea666cd7d02086d4a85b614fbba36c9cf3382e10714f5c
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                mkdir -p /tmp/nginx-conf.d /tmp/nginx-html /tmp/nginx-cache /tmp/nginx-run
                # Seed swaparr's static UI assets from the read-only image.
                # Plain `cp` (no -a): the init container runs as non-root and
                # `cp -a` would try to chown to root, which fails with
                # "Operation not permitted". We don't need to preserve
                # ownership — the emptyDir will be chowned to fsGroup (1000)
                # on first mount anyway.
                cp -r /usr/share/nginx/html/. /tmp/nginx-html/
                # Pre-create config.json so its parent is owned by the pod
                # fsGroup (1000) and writable by the app uid; otherwise
                # the bash redirect in 40-generate-config.sh fails with
                # permission denied even when the emptyDir is mode 0777.
                : > /tmp/nginx-html/config.json
                # Copy the swaparr nginx template into the conf.d overlay.
                # The emptyDir at /etc/nginx/conf.d replaces the read-only
                # image dir, so without this 40-generate-config.sh can't find
                # its template.
                cp /etc/nginx/conf.d/default.conf.template /tmp/nginx-conf.d/
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: false
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image: *image
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 128Mi
            env:
              NGINX_PORT: &port 8080
              # Must be the externally-resolvable Dispatcharr hostname,
              # not the in-cluster DNS. swaparr writes this into
              # /usr/share/nginx/html/config.json at startup and the
              # BROWSER reads it and calls this URL directly — so the
              # browser's network has to be able to resolve it.
              # `dispatcharr.default.svc` only resolves inside the cluster.
              # `dispatcharr.${INTERNAL_SECRET_DOMAIN}` is the same
              # hostname Dispatcharr's own route is exposed at, so the
              # gateway routes the browser's request to the Dispatcharr
              # service.
              DISPATCHARR_URL: https://dispatcharr.default.svc:9191
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${INTERNAL_SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      # One emptyDir backs every writable overlay path the swaparr /
      # nginx-alpine entrypoint chain mutates at runtime. With
      # readOnlyRootFilesystem on the app container, all of these paths
      # have to come from a writable volume; using a single volume with
      # subPath mounts keeps the pod spec compact and means the init
      # container only has to stage one place.
      #
      #   /tmp/nginx-conf.d    → /etc/nginx/conf.d       (entrypoint scripts
      #                                                  edit /envsubst
      #                                                  default.conf here)
      #   /tmp/nginx-html      → /usr/share/nginx/html   (nginx root +
      #                                                  swaparr's
      #                                                  config.json)
      #   /tmp/nginx-cache     → /var/cache/nginx        (proxy / client_body
      #                                                  / fastcgi / uwsgi /
      #                                                  scgi temp_path)
      #   /tmp/nginx-run       → /var/run                (nginx.pid)
      #   /tmp                 → /tmp                    (general scratch)
      tmp:
        type: emptyDir
        advancedMounts:
          swaparr:
            # The init container also needs /tmp writable so its `mkdir -p`
            # can stage the nginx-* subdirs before the app container
            # bind-mounts them via subPath.
            init-tmp:
              - path: /tmp
            app:
              - path: /tmp
              - path: /etc/nginx/conf.d
                subPath: nginx-conf.d
              - path: /usr/share/nginx/html
                subPath: nginx-html
              - path: /var/cache/nginx
                subPath: nginx-cache
              - path: /var/run
                subPath: nginx-run
