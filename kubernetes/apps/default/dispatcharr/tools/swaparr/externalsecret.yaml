---
# yaml-language-server: $schema=https://kubernetes-schemas-eov.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: swaparr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: swaparr-secret
    template:
      data:
        DISPATCHARR_API_KEY: "{{ .DISPATCHARR_SWAPARR_API_KEY }}"
  dataFrom:
    - extract:
        key: dispatcharr
